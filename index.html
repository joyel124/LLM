<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat Gemma 4 — Local</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Segoe UI, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #16213e;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #00d4ff22;
    }
    header h1 { font-size: 1.1em; font-weight: 600; color: #00d4ff; }
    .badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 99px;
      background: #00d4ff1a;
      color: #00d4ffcc;
      border: 1px solid #00d4ff33;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #00d4ff;
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:0.3 } }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: #00d4ff33; border-radius: 99px; }

    .burbuja {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.95em;
      line-height: 1.6;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from{ opacity:0; transform:translateY(6px) } to{ opacity:1; transform:translateY(0) } }

    .user {
      background: #0f3460;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }
    .ai {
      background: #16213e;
      border: 1px solid #00d4ff22;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }
    .ai-label {
      font-size: 11px;
      font-weight: 600;
      color: #00d4ff;
      margin-bottom: 5px;
      letter-spacing: 0.03em;
    }
    .pensando { opacity: 0.6; font-style: italic; }

    /* Tiempo de respuesta */
    .tiempo {
      font-size: 10px;
      color: #00d4ff55;
      margin-top: 6px;
      text-align: right;
    }

    /* Historial vacío */
    .empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff22;
      font-size: 0.85em;
    }

    /* ── Footer ── */
    footer {
      display: flex;
      padding: 14px 16px;
      gap: 10px;
      background: #16213e;
      border-top: 1px solid #00d4ff11;
    }
    input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #0f3460;
      background: #0f3460;
      color: white;
      font-size: 0.95em;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #00d4ff55; }
    input::placeholder { color: #ffffff44; }

    button {
      padding: 12px 22px;
      background: #00d4ff;
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.9em;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button:hover:not(:disabled) { opacity: 0.85; }

    #limpiar {
      background: transparent;
      color: #ffffff33;
      border: 1px solid #ffffff11;
      padding: 12px 14px;
      font-size: 0.8em;
      font-weight: 400;
    }
    #limpiar:hover:not(:disabled) { color: #ffffff66; border-color: #ffffff33; opacity: 1; }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>Chat con Gemma 4</h1>
  <span class="badge" id="modelo-badge">gemma4:latest · Ollama</span>
</header>

<div id="chat">
  <div class="burbuja ai">
    <div class="ai-label">Gemma 4</div>
    ¡Hola! Soy Gemma 4 corriendo en tu PC. ¿En qué te ayudo?
  </div>
</div>

<footer>
  <button id="limpiar" onclick="limpiarChat()">🗑 Limpiar</button>
  <input type="text" id="input" placeholder="Escribe tu mensaje y presiona Enter..." />
  <button id="btn" onclick="enviar()">Enviar ↑</button>
</footer>

<script>
  const inputEl = document.getElementById('input');
  const btnEl   = document.getElementById('btn');
  const chatEl  = document.getElementById('chat');

  // ── Configuración ──────────────────────────────────────
  const MODELO   = 'gemma4:latest';       // cambia aquí si usas otra variante
  const API_URL  = 'http://localhost:11434/api/generate';
  const SYSTEM   = 'Eres un asistente útil que responde siempre en español de forma clara y concisa.';
  // ────────────────────────────────────────────────────────

  let historial = [];  // memoria de la conversación

  inputEl.addEventListener('keypress', e => {
    if (e.key === 'Enter' && !btnEl.disabled) enviar();
  });

  function agregarBurbuja(tipo, html) {
    const div = document.createElement('div');
    div.className = `burbuja ${tipo}`;
    div.innerHTML = html;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  async function enviar() {
    const msg = inputEl.value.trim();
    if (!msg) return;

    // Mostrar mensaje del usuario
    agregarBurbuja('user', escapeHtml(msg));
    inputEl.value = '';
    btnEl.disabled = true;

    // Guardar en historial
    historial.push({ role: 'user', content: msg });

    // Construir prompt con historial
    let prompt = `Sistema: ${SYSTEM}\n\n`;
    historial.slice(-10).forEach(m => {
      prompt += m.role === 'user'
        ? `Usuario: ${m.content}\n`
        : `Asistente: ${m.content}\n`;
    });
    prompt += 'Asistente:';

    // Indicador de "pensando"
    const thinking = agregarBurbuja('ai pensando', '<div class="ai-label">Gemma 4</div>Pensando...');
    const t0 = Date.now();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: MODELO, prompt, stream: false })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const respuesta = data.response.trim();
      const segundos = ((Date.now() - t0) / 1000).toFixed(1);

      // Guardar respuesta en historial
      historial.push({ role: 'assistant', content: respuesta });

      thinking.className = 'burbuja ai';
      thinking.innerHTML = `
        <div class="ai-label">Gemma 4</div>
        ${escapeHtml(respuesta).replace(/\n/g, '<br>')}
        <div class="tiempo">⏱ ${segundos}s</div>
      `;

    } catch (err) {
      thinking.className = 'burbuja ai';
      thinking.style.borderColor = '#ff4444';
      thinking.innerHTML = `
        <div class="ai-label" style="color:#ff4444">Error de conexión</div>
        No se pudo conectar. Asegúrate de que Ollama está corriendo:<br>
        <code style="font-size:12px;color:#00d4ff">ollama serve</code>
      `;
    }

    btnEl.disabled = false;
    inputEl.focus();
  }

  function limpiarChat() {
    historial = [];
    chatEl.innerHTML = `
      <div class="burbuja ai">
        <div class="ai-label">Gemma 4</div>
        Chat reiniciado. ¿En qué te puedo ayudar?
      </div>`;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }
</script>

</body>
</html>
