<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gemma — Chat con RAG + Agente</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f1a; --surface: #16213e; --surface2: #1a2a4a;
      --border: #ffffff0f; --accent: #00d4ff; --accent2: #7f77dd;
      --text: #e8eaf0; --muted: #8892a4;
      --success: #1d9e75; --danger: #e24b4a;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

    #sidebar { width: 270px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .sb-head { padding: 16px; border-bottom: 1px solid var(--border); }
    .sb-head h2 { font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: .08em; text-transform: uppercase; }
    .sb-sec { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .sb-sec label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: 6px; }

    .cfg-in { width: 100%; padding: 7px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; margin-bottom: 6px; outline: none; }
    .cfg-in:focus { border-color: var(--accent); }

    .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
    .toggle-row span { font-size: 12px; }
    .tog { width: 36px; height: 19px; background: var(--surface2); border-radius: 99px; border: 1px solid var(--border); cursor: pointer; position: relative; transition: background .2s; }
    .tog.on { background: var(--accent); }
    .tog::after { content: ''; position: absolute; width: 13px; height: 13px; border-radius: 50%; background: white; top: 2px; left: 2px; transition: left .2s; }
    .tog.on::after { left: 19px; }

    .upload-zone { border: 1px dashed var(--border); border-radius: 7px; padding: 10px; text-align: center; cursor: pointer; font-size: 11px; color: var(--muted); transition: border-color .2s, color .2s; }
    .upload-zone:hover { border-color: var(--accent); color: var(--accent); }
    #file-input { display: none; }
    .up-msg { font-size: 11px; margin-top: 5px; padding: 4px 7px; border-radius: 5px; }
    .up-msg.ok  { background: #1d9e7520; color: #5DCAA5; }
    .up-msg.err { background: #e24b4a20; color: #F09595; }

    #docs-list { flex: 1; overflow-y: auto; }
    .doc-item { display: flex; align-items: center; gap: 7px; padding: 5px 16px; font-size: 11px; color: var(--muted); }
    .doc-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .doc-del { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 12px; opacity: 0; transition: opacity .15s; }
    .doc-item:hover .doc-del { opacity: 1; }
    .docs-empty { padding: 10px 16px; font-size: 11px; color: var(--muted); text-align: center; }

    .status { margin: 10px 16px 12px; padding: 6px 10px; border-radius: 6px; font-size: 11px; display: flex; align-items: center; gap: 6px; }
    .status.ok   { background: #1d9e7518; color: #5DCAA5; border: 1px solid #1d9e7535; }
    .status.warn { background: #ba751718; color: #EF9F27; border: 1px solid #ba751735; }
    .status.err  { background: #e24b4a18; color: #F09595; border: 1px solid #e24b4a35; }
    .sdot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #chat-head { background: var(--surface); padding: 13px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    #chat-head h1 { font-size: 14px; font-weight: 600; color: var(--accent); }
    .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
    .mbadge { margin-left: auto; font-size: 10px; padding: 2px 9px; border-radius: 99px; background: #00d4ff12; color: var(--accent); border: 1px solid #00d4ff28; }

    #chat { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
    #chat::-webkit-scrollbar { width: 3px; }
    #chat::-webkit-scrollbar-thumb { background: #ffffff12; border-radius: 99px; }

    .mwrap { display: flex; flex-direction: column; gap: 3px; }
    .mwrap.user { align-items: flex-end; }
    .mwrap.ai   { align-items: flex-start; }

    .bub { max-width: 72%; padding: 10px 14px; border-radius: 13px; font-size: 13.5px; line-height: 1.65; animation: fadeUp .18s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)} }
    .bub.user { background: var(--surface2); border-bottom-right-radius: 3px; }
    .bub.ai   { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
    .ai-name  { font-size: 10px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
    .thinking { color: var(--muted); font-style: italic; font-size: 13px; }

    .mmeta { display: flex; align-items: center; gap: 7px; padding: 0 3px; }
    .mtime { font-size: 10px; color: var(--muted); }
    .tbadge { font-size: 10px; padding: 1px 6px; border-radius: 99px; }
    .tbadge.agent  { background: #7f77dd18; color: #AFA9EC; border: 1px solid #7f77dd35; }
    .tbadge.direct { background: #1d9e7518; color: #5DCAA5; border: 1px solid #1d9e7535; }

    #footer { padding: 12px 14px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
    #msg-in { flex: 1; padding: 10px 13px; background: var(--bg); border: 1px solid var(--border); border-radius: 9px; color: var(--text); font-size: 13.5px; outline: none; transition: border-color .2s; }
    #msg-in:focus { border-color: var(--accent); }
    #msg-in::placeholder { color: var(--muted); }
    .btn-send { padding: 10px 18px; background: var(--accent); color: #0f0f1a; border: none; border-radius: 9px; font-weight: 700; font-size: 13px; cursor: pointer; transition: opacity .2s; }
    .btn-send:disabled { opacity: .4; cursor: not-allowed; }
    .btn-clear { padding: 10px 12px; background: transparent; border: 1px solid var(--border); border-radius: 9px; color: var(--muted); font-size: 13px; cursor: pointer; }
    .btn-clear:hover { color: var(--danger); border-color: var(--danger); }
  </style>
</head>
<body>

<div id="sidebar">
  <div class="sb-head"><h2>Configuracion</h2></div>

  <div class="sb-sec">
    <label>API URL</label>
    <input class="cfg-in" id="cfg-url" value="http://localhost:11434">
    <label>API Key</label>
    <input class="cfg-in" id="cfg-key" type="password" value="123456">
    <div class="toggle-row">
      <span>Modo agente activo</span>
      <div class="tog on" id="atog" onclick="toggleAgent()"></div>
    </div>
  </div>

  <div class="sb-sec">
    <label>Documentos RAG</label>
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
      + Subir PDF o TXT
    </div>
    <input type="file" id="file-input" accept=".pdf,.txt" onchange="subirDoc(this)">
    <div id="up-msg"></div>
  </div>

  <div id="docs-list"></div>

  <div id="sbar" class="status warn">
    <div class="sdot"></div>
    <span id="stxt">Verificando...</span>
  </div>
</div>

<div id="main">
  <div id="chat-head">
    <div class="pulse"></div>
    <h1>Chat con Gemma</h1>
    <span class="mbadge" id="mlabel">cargando...</span>
  </div>

  <div id="chat">
    <div class="mwrap ai">
      <div class="bub ai">
        <div class="ai-name">Gemma</div>
        Hola! Estoy lista. Puedo buscar en internet, consultar tus documentos y responderte con contexto actual. En que te ayudo?
      </div>
    </div>
  </div>

  <div id="footer">
    <button class="btn-clear" onclick="limpiar()" title="Limpiar chat">&#128465;</button>
    <input type="text" id="msg-in" placeholder="Escribe tu mensaje...">
    <button class="btn-send" id="bsend" onclick="enviar()">Enviar</button>
  </div>
</div>

<script>
  const chatEl = document.getElementById('chat');
  const inEl   = document.getElementById('msg-in');
  const btnEl  = document.getElementById('bsend');
  let hist = [], useAgent = true;

  const url = () => document.getElementById('cfg-url').value.replace(/\/$/,'');
  const key = () => document.getElementById('cfg-key').value;
  const hdrs = () => ({ 'Content-Type':'application/json', 'X-API-Key': key() });

  window.addEventListener('load', () => { chkConn(); loadDocs(); });
  inEl.addEventListener('keypress', e => { if(e.key==='Enter' && !btnEl.disabled) enviar(); });

  function toggleAgent() {
    useAgent = !useAgent;
    document.getElementById('atog').classList.toggle('on', useAgent);
  }

  async function chkConn() {
    const bar = document.getElementById('sbar');
    const txt = document.getElementById('stxt');
    try {
      const r = await fetch(`${url()}/`, { headers: { 'X-API-Key': key() } });
      const d = await r.json();
      bar.className = 'status ok';
      txt.textContent = `Conectado · ${d.model}`;
      document.getElementById('mlabel').textContent = d.model;
    } catch {
      bar.className = 'status err';
      txt.textContent = 'Sin conexion con la API';
      document.getElementById('mlabel').textContent = 'desconectado';
    }
  }

  async function loadDocs() {
    const el = document.getElementById('docs-list');
    try {
      const r = await fetch(`${url()}/documentos`, { headers: { 'X-API-Key': key() } });
      const d = await r.json();
      if (!d.documentos.length) { el.innerHTML = '<div class="docs-empty">Sin documentos aun</div>'; return; }
      el.innerHTML = d.documentos.map(f => `
        <div class="doc-item">
          <span>${f.endsWith('.pdf') ? 'PDF' : 'TXT'}</span>
          <span class="doc-name" title="${f}">${f}</span>
          <button class="doc-del" onclick="delDoc('${f}')">x</button>
        </div>`).join('');
    } catch { el.innerHTML = '<div class="docs-empty">Error cargando docs</div>'; }
  }

  async function subirDoc(inp) {
    const file = inp.files[0]; if (!file) return;
    const msgEl = document.getElementById('up-msg');
    msgEl.className = 'up-msg'; msgEl.textContent = 'Subiendo...';
    const form = new FormData(); form.append('file', file);
    try {
      const r = await fetch(`${url()}/upload`, { method:'POST', headers:{'X-API-Key':key()}, body: form });
      const d = await r.json();
      msgEl.className = 'up-msg ok'; msgEl.textContent = d.mensaje || 'Listo';
      loadDocs();
    } catch { msgEl.className = 'up-msg err'; msgEl.textContent = 'Error al subir'; }
    inp.value = '';
    setTimeout(() => { msgEl.textContent=''; msgEl.className=''; }, 3000);
  }

  async function delDoc(nombre) {
    try {
      await fetch(`${url()}/documentos/${encodeURIComponent(nombre)}`, { method:'DELETE', headers:{'X-API-Key':key()} });
      loadDocs();
    } catch { alert('Error al eliminar'); }
  }

  async function enviar() {
    const msg = inEl.value.trim(); if (!msg) return;
    addMsg('user', msg);
    hist.push({ role:'user', content: msg });
    inEl.value = ''; btnEl.disabled = true;
    const thinkEl = addThink();
    try {
      const r = await fetch(`${url()}/chat`, {
        method: 'POST',
        headers: hdrs(),
        body: JSON.stringify({ message: msg, history: hist.slice(-10), use_agent: useAgent })
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.detail || `Error ${r.status}`); }
      const d = await r.json();
      hist.push({ role:'assistant', content: d.response });
      replaceThink(thinkEl, d.response, d.time_seconds, d.used_tools);
    } catch(e) { replaceErr(thinkEl, e.message); }
    btnEl.disabled = false; inEl.focus();
  }

  function addMsg(rol, txt) {
    const w = document.createElement('div');
    w.className = `mwrap ${rol}`;
    w.innerHTML = `<div class="bub ${rol}">${rol==='ai'?'<div class="ai-name">Gemma</div>':''}${esc(txt)}</div>`;
    chatEl.appendChild(w); chatEl.scrollTop = chatEl.scrollHeight; return w;
  }

  function addThink() {
    const w = document.createElement('div');
    w.className = 'mwrap ai';
    w.innerHTML = `<div class="bub ai thinking"><div class="ai-name">Gemma</div>Procesando${useAgent?' con herramientas':''}...</div>`;
    chatEl.appendChild(w); chatEl.scrollTop = chatEl.scrollHeight; return w;
  }

  function replaceThink(w, txt, secs, tools) {
    const badge = tools
      ? `<span class="tbadge agent">agente</span>`
      : `<span class="tbadge direct">directo</span>`;
    w.innerHTML = `
      <div class="bub ai"><div class="ai-name">Gemma</div>${esc(txt)}</div>
      <div class="mmeta"><span class="mtime">⏱ ${secs}s</span>${badge}</div>`;
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function replaceErr(w, msg) {
    w.innerHTML = `<div class="bub ai" style="border-color:#e24b4a40"><div class="ai-name" style="color:#F09595">Error</div>${esc(msg)}</div>`;
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function limpiar() {
    hist = [];
    chatEl.innerHTML = `<div class="mwrap ai"><div class="bub ai"><div class="ai-name">Gemma</div>Chat reiniciado. En que te ayudo?</div></div>`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }
</script>
</body>
</html>
